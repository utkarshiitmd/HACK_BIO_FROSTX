# config.yaml
# ─── All hyperparameters for the Bone Fracture Classification project ────────

data:
  root: "data"                # folder containing train/ val/ test/ subfolders
  img_size: 224               # resize all images to this square size
  mean: [0.485, 0.456, 0.406] # ImageNet mean (grayscale images converted to RGB)
  std:  [0.229, 0.224, 0.225] # ImageNet std
  num_workers: 4

model:
  embed_dim: 256   # Transformer embedding dimension
  num_heads: 8     # Multi-head attention heads
  depth: 4         # Number of Transformer encoder blocks
  dropout: 0.3     # Dropout rate
  num_classes: 2
training:
  epochs: 30
  cv_epochs: 20        # Epochs per fold during cross-validation
  batch_size: 4
  lr: 3.0e-4
  weight_decay: 1.0e-4
  patience: 10         # Early stopping patience
  save_dir: "checkpoints"

evaluation:
  out_dir: "outputs"
  checkpoint: "checkpoints/best_model.pth"
